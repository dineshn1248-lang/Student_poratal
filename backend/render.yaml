services:
  - type: web
    name: student-portal-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      # Add META_ACCESS_TOKEN and other tokens securely in the Render dashboard
